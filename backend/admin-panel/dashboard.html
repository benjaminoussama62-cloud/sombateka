<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>SombaTeka Admin</title>
  <link rel="icon" href="/admin/assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/admin/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/admin/assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/admin/assets/apple-touch-icon.png">
  <meta name="application-name" content="SombaTeka Admin">
  <meta name="theme-color" content="#1e3a8a">
  <link rel="stylesheet" href="/admin/assets/styles.css?v=10-catalog-carousel">
</head>
<body class="dashboard-page">
  <div id="app" class="app">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-mark sm">ST</span>
        <div>
          <strong>SombaTeka</strong>
          <small>Administration</small>
        </div>
      </div>
      <nav class="nav" id="main-nav">
        <p class="nav-section" data-nav-section="ops">Menu</p>
        <button type="button" class="nav-item active" data-page="dashboard" data-perm="dashboard.view">
          <span>Tableau de bord</span>
        </button>
        <button type="button" class="nav-item" data-page="support" data-perm="support.view">
          <span>Centre d'aide</span>
          <span class="nav-badge warn" data-badge="support_unread" hidden>0</span>
        </button>
        <button type="button" class="nav-item" data-page="reports" data-perm="reports.view">
          <span>Signalements</span>
          <span class="nav-badge warn" data-badge="reports_open" hidden>0</span>
        </button>
        <button type="button" class="nav-item" data-page="escrow" data-perm="escrow.view">
          <span>Litiges & séquestre</span>
        </button>
        <button type="button" class="nav-item" data-page="listings" data-perm="listings.view">
          <span>Annonces</span>
        </button>
        <button type="button" class="nav-item" data-page="kyc" data-perm="kyc.view">
          <span>Comptes pro</span>
          <span class="nav-badge" data-badge="kyc_pending" hidden>0</span>
        </button>
        <button type="button" class="nav-item" data-page="users" data-perm="users.view">
          <span>Utilisateurs</span>
        </button>
        <p class="nav-section" data-nav-section="gov">Administration</p>
        <button type="button" class="nav-item" data-page="audit" data-perm="audit.view">
          <span>Journal d'audit</span>
        </button>
        <button type="button" class="nav-item" data-page="team" data-perm="team.view">
          <span>Équipe</span>
        </button>
      </nav>
      <div class="sidebar-foot">
        <div id="admin-identity" class="admin-user"></div>
        <button type="button" id="logout-btn" class="btn btn-ghost btn-sm btn-block">Déconnexion</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="page-title">Tableau de bord</h2>
          <p id="page-subtitle" class="page-subtitle" hidden></p>
        </div>
        <button type="button" id="refresh-btn" class="btn btn-ghost">Actualiser</button>
      </header>

      <div id="page-content" class="page-content">
        <div id="page-loading" class="page-loading" hidden>
          <div class="spinner"></div>
          <span>Chargement…</span>
        </div>
        <section id="page-dashboard" class="page active"></section>
        <section id="page-support" class="page"></section>
        <section id="page-kyc" class="page"></section>
        <section id="page-reports" class="page"></section>
        <section id="page-users" class="page"></section>
        <section id="page-escrow" class="page"></section>
        <section id="page-listings" class="page"></section>
        <section id="page-audit" class="page"></section>
        <section id="page-team" class="page"></section>
      </div>
    </main>
  </div>

  <dialog id="modal" class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Détail</h3>
      <button type="button" class="modal-close" id="modal-close" aria-label="Fermer">×</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
    <div id="modal-actions" class="modal-actions"></div>
  </dialog>

  <div id="toast" class="toast" hidden></div>
  <script src="/admin/assets/app.js?v=10-catalog-carousel" type="module"></script>
</body>
</html>
