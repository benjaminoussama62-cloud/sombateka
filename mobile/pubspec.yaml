name: sombateka
description: "SombaTeka — marketplace premium RDC (Android & iOS)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  http_parser: ^4.1.2
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
  web: ^1.1.1

  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+1
  go_router: ^14.6.2
  flutter_animate: ^4.5.2
  lottie: ^3.2.0
  google_fonts: ^6.2.1

  flutter_staggered_animations: ^1.1.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10

  flutter_typeahead: ^4.8.0
  searchfield: ^0.8.2

  image: ^4.2.0
  permission_handler: ^11.3.1

  flutter_local_notifications: ^17.2.3
  firebase_messaging: ^15.1.3
  firebase_core: ^3.8.0

  flutter_chat_ui: ^1.6.13
  web_socket_channel: ^3.0.3

  provider: ^6.1.2
  flutter_bloc: ^8.1.6

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5

  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^7.2.2
  package_info_plus: ^8.3.0

  sentry_flutter: ^8.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#0D1B4B"
  adaptive_icon_foreground: assets/icon/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0D1B4B"
  image: assets/icon/app_icon.png
  android_12:
    color: "#0D1B4B"
    image: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
