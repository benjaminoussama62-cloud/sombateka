version: '3.8'

services:
  db:
    image: postgres:16
    container_name: sombateka-db-prod
    environment:
      POSTGRES_USER: sombateka
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sombateka_prod
    volumes:
      - sombateka_pgdata_prod:/var/lib/postgresql/data
    networks:
      - sombateka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sombateka -d sombateka_prod"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: sombateka-redis-prod
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - sombateka-network
    restart: unless-stopped
    volumes:
      - sombateka_redis_data:/data

  backend:
    build: .
    container_name: sombateka-backend-prod
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://sombateka:${DB_PASSWORD}@db:5432/sombateka_prod
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "true"
      AUTO_CREATE_TABLES: "false"
      SEED_DEV_DATA: "false"
      EXPOSE_OTP_IN_RESPONSE: "false"
      PAYMENT_SANDBOX_MODE: "false"
      USE_REDIS_RATE_LIMIT: "true"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sombateka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - ./uploads:/app/uploads

  celery-worker:
    build: .
    container_name: sombateka-celery-prod
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=4
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://sombateka:${DB_PASSWORD}@db:5432/sombateka_prod
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    env_file:
      - .env.production
    depends_on:
      - backend
      - redis
    networks:
      - sombateka-network
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: sombateka-celery-beat-prod
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - celery-worker
    networks:
      - sombateka-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: sombateka-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/snippets:/etc/nginx/snippets:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - ../website:/var/www/sombateka:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sombateka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sombateka_pgdata_prod:
  sombateka_redis_data:
  certbot-webroot:

networks:
  sombateka-network:
    driver: bridge
