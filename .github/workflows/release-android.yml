name: Release Android

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: API base URL
        default: https://api.sombateka.cd
  push:
    tags:
      - "v*.*.*"

jobs:
  build-aab:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate store assets
        run: |
          pip install -r scripts/requirements.txt
          python scripts/generate_store_assets.py

      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/sombateka-upload.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=upload
          storeFile=sombateka-upload.jks
          EOF

      - name: Build App Bundle
        run: |
          flutter pub get
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create
          flutter build appbundle --release \
            --dart-define=ST_API_BASE_URL=${{ github.event.inputs.api_url || 'https://api.sombateka.cd' }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN_MOBILE }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
