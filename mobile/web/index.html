<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="ST (SombaTeka) — marketplace RDC.">

  <!-- Local dev helper: tells the Flutter app where FastAPI is. -->
  <meta name="st-api-base" content="">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ST">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png">

  <title>ST</title>
  <link rel="manifest" href="manifest.json">

  <script>
    (function () {
      var loc = window.location;
      var host = loc.hostname;
      var proto = loc.protocol || 'http:';
      var port = loc.port ? parseInt(loc.port, 10) : (proto === 'https:' ? 443 : 80);
      var apiPort = (port === 8000) ? port : 8000;
      var origin = proto + '//' + host + ':' + apiPort;
      window.stApiBaseUrl = origin;
      var meta = document.querySelector('meta[name="st-api-base"]');
      if (meta) meta.setAttribute('content', window.stApiBaseUrl);
    })();
  </script>
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  
  
  
  
  
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #0D1B4B;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body style="margin:0;background:#0D1B4B;">
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
  
  
  
  <div id="st-loading" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;color:#fff;z-index:9999;pointer-events:none;">
    <div style="width:48px;height:48px;border:3px solid rgba(255,255,255,.25);border-top-color:#FFD700;border-radius:50%;animation:st-spin 1s linear infinite;"></div>
    <p style="margin:20px 16px 0;font-size:16px;font-weight:600;">Chargement de SombaTeka…</p>
    <p style="margin:8px 16px 0;font-size:13px;opacity:.75;text-align:center;max-width:320px;">Premier chargement : 30–60 s sur iPhone.</p>
  </div>
  <style>@keyframes st-spin{to{transform:rotate(360deg)}}</style>
  <script>
    (function () {
      function hideLoading() {
        var el = document.getElementById('st-loading');
        if (el) el.style.display = 'none';
      }
      window.addEventListener('flutter-first-frame', hideLoading);
      // Ne pas afficher les erreurs internes Flutter/debug (removeChild, WebSocket…).
      window.addEventListener('error', function (e) {
        var m = (e && e.message) || '';
        if (/removeChild|parentNode|loader|WebSocket|DevHandler/i.test(m)) return;
      }, true);
    })();
  </script>
  <script src="flutter_bootstrap.js" async=""></script>


</body></html>
